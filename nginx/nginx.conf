upstream frontend { server frontend:3000; }
upstream backend  { server backend:5000;  }

server {
    listen 80;
    server_name _;

    # React frontend
    location / {
        proxy_pass         http://frontend;
    }

    # Flask API — strip /api prefix before forwarding
    location /api/ {
        proxy_pass         http://backend/;
    }
}
