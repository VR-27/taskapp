upstream frontend { server frontend:3000; }
upstream backend  { server backend:5000;  }

server {
    listen 80;
    server_name my-taskapp.duckdns.org;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name my-taskapp.duckdns.org;

    # Point to the certificates we mounted from the host
    ssl_certificate /etc/letsencrypt/live/my-taskapp.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-taskapp.duckdns.org/privkey.pem;

    # 1. Implement Basic Logging (Task Requirement)
    access_log /var/log/nginx/taskapp_access.log;
    error_log /var/log/nginx/taskapp_error.log warn;

    # React frontend
    location / {
        proxy_pass         http://frontend/;
        # 2. Crucial Production Headers
        # These ensure your app knows the client's real IP, not just Nginx's internal Docker IP.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flask API — strip /api prefix before forwarding
    location /api/ {
        proxy_pass         http://backend/;
        # 2. Crucial Production Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
